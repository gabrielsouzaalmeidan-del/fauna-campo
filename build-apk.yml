name: Build APK - WildLog

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Gerar APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Preparar estrutura do projeto
        run: |
          mkdir -p www
          if [ -f "index.html" ]; then
            cp index.html www/index.html
          fi
          npm install xlsx --no-save --silent 2>/dev/null || true
          cp node_modules/xlsx/dist/xlsx.full.min.js www/xlsx.full.min.js 2>/dev/null || true
          if [ -f "www/index.html" ]; then
            sed -i 's|src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/[^"]*"|src="xlsx.full.min.js"|g' www/index.html
          fi
          ls -lah www/

      - name: Criar package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "wildlog",
            "version": "1.8.0",
            "private": true,
            "dependencies": {
              "@capacitor/android": "6.0.0",
              "@capacitor/cli": "6.0.0",
              "@capacitor/core": "6.0.0",
              "@capacitor/geolocation": "6.0.0"
            }
          }
          EOF

      - name: Criar capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "br.com.wildlog.app",
            "appName": "WildLog",
            "webDir": "www",
            "android": {
              "allowMixedContent": true
            },
            "plugins": {
              "Geolocation": {
                "permissions": ["location"]
              }
            }
          }
          EOF

      - name: Instalar Capacitor e plugins
        run: npm install

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Sincronizar arquivos e plugins
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Instalar ícones do app
        run: |
          # Copiar ícone fonte (512px) para os diretórios mipmap do Android
          if [ -f "icon.png" ]; then
            echo "Instalando ícones WildLog..."
            pip install Pillow --break-system-packages -q
            python3 << 'PYEOF'
          from PIL import Image
          import os

          src = "icon.png"
          img = Image.open(src).convert("RGBA")

          sizes = {
              "android/app/src/main/res/mipmap-mdpi/ic_launcher.png":    48,
              "android/app/src/main/res/mipmap-hdpi/ic_launcher.png":    72,
              "android/app/src/main/res/mipmap-xhdpi/ic_launcher.png":   96,
              "android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png":  144,
              "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png": 192,
              "android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png":    48,
              "android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png":    72,
              "android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png":   96,
              "android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png":  144,
              "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png": 192,
          }

          for path, size in sizes.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              img.resize((size, size), Image.LANCZOS).save(path, "PNG")
              print(f"OK {path}")
          PYEOF
            echo "Ícones instalados!"
          else
            echo "icon.png não encontrado — mantendo ícone padrão do Capacitor"
          fi

      - name: Adicionar permissões no AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>|' "$MANIFEST"
            echo "Permissões adicionadas"
          fi

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WildLog-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "WildLog — Build ${{ github.run_number }}"
          body: |
            ## 📱 WildLog — APK Android
            **Novidades desta versão:**
            - ✅ GPS com permissão nativa Android
            - ✅ Ícone WildLog personalizado
            **Como instalar:**
            1. Baixe o `.apk` abaixo
            2. Configurações → Segurança → Permitir fontes desconhecidas
            3. Abra e instale
            **Build:** #${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
