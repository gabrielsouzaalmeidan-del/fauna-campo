name: Build APK - Fauna Campo

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Gerar APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Preparar estrutura do projeto
        run: |
          mkdir -p www
          if [ -f "index.html" ]; then
            cp index.html www/index.html
            echo "index.html copiado para www/"
          fi
          npm install xlsx --no-save --silent 2>/dev/null || true
          cp node_modules/xlsx/dist/xlsx.full.min.js www/xlsx.full.min.js 2>/dev/null || true
          if [ -f "www/index.html" ]; then
            sed -i 's|src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/[^"]*"|src="xlsx.full.min.js"|g' www/index.html
            echo "Referências CDN corrigidas"
          fi
          ls -lah www/

      - name: Criar package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "fauna-campo",
            "version": "1.8.0",
            "private": true,
            "dependencies": {
              "@capacitor/android": "6.0.0",
              "@capacitor/cli": "6.0.0",
              "@capacitor/core": "6.0.0",
              "@capacitor/geolocation": "6.0.0"
            }
          }
          EOF

      - name: Criar capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "br.com.faunacampo.app",
            "appName": "Fauna Campo",
            "webDir": "www",
            "android": {
              "allowMixedContent": true
            },
            "plugins": {
              "Geolocation": {
                "permissions": ["location"]
              }
            }
          }
          EOF

      - name: Instalar Capacitor e plugins
        run: npm install

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Sincronizar arquivos e plugins
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Adicionar permissões no AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>|' "$MANIFEST"
            echo "Permissões adicionadas:"
            grep "permission" "$MANIFEST"
          fi

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FaunaCampo-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Fauna Campo — Build ${{ github.run_number }}"
          body: |
            ## 📱 Fauna Campo v1.8 — APK Android
            **Novidades:**
            - ✅ GPS com solicitação de permissão nativa no Android
            **Como instalar:**
            1. Baixe o arquivo `.apk` abaixo
            2. No celular Android: Configurações → Segurança → Permitir fontes desconhecidas
            3. Abra o `.apk` e toque em Instalar
            **Build:** #${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
