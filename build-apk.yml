name: Build APK - WildLog

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Gerar APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Preparar pasta www
        run: |
          mkdir -p www
          cp index.html www/index.html
          npm install xlsx --no-save --silent 2>/dev/null || true
          cp node_modules/xlsx/dist/xlsx.full.min.js www/xlsx.full.min.js 2>/dev/null || true
          sed -i 's|src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/[^"]*"|src="xlsx.full.min.js"|g' www/index.html
          echo "=== www/ ===" && ls -lah www/

      - name: Instalar Capacitor
        run: npm install

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Sincronizar arquivos
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Instalar ícone personalizado
        run: |
          pip install Pillow --break-system-packages -q
          python3 << 'PYEOF'
          from PIL import Image
          import os

          src = "icon.png"
          if not os.path.exists(src):
              print("icon.png não encontrado — pulando")
              exit(0)

          img = Image.open(src).convert("RGBA")
          print(f"Ícone fonte: {img.size}")

          targets = {
              "android/app/src/main/res/mipmap-mdpi/ic_launcher.png":         48,
              "android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png":   48,
              "android/app/src/main/res/mipmap-hdpi/ic_launcher.png":         72,
              "android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png":   72,
              "android/app/src/main/res/mipmap-xhdpi/ic_launcher.png":        96,
              "android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png":  96,
              "android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png":      144,
              "android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png":144,
              "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png":     192,
              "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png":192,
          }

          for path, size in targets.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              img.resize((size, size), Image.LANCZOS).save(path, "PNG")
              print(f"✅ {size}px → {path}")

          print("Ícones instalados com sucesso!")
          PYEOF

      - name: Adicionar permissões GPS e câmera no AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          echo "=== AndroidManifest ANTES ===" && grep "permission" "$MANIFEST" || true

          # Adicionar permissões após a tag INTERNET
          sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>|' "$MANIFEST"

          echo "=== AndroidManifest DEPOIS ===" && grep "permission" "$MANIFEST"

      - name: Verificar appName no strings.xml
        run: |
          STRINGS="android/app/src/main/res/values/strings.xml"
          echo "=== strings.xml atual ===" && cat "$STRINGS"
          # Forçar nome WildLog
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">WildLog</string>|g' "$STRINGS"
          echo "=== strings.xml corrigido ===" && cat "$STRINGS"

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WildLog-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "WildLog — Build ${{ github.run_number }}"
          body: |
            ## 📱 WildLog — APK Android
            **Correções desta versão:**
            - ✅ Nome WildLog corrigido via strings.xml
            - ✅ Ícone personalizado instalado
            - ✅ GPS com permissão nativa Android
            **Como instalar:**
            1. Desinstale a versão anterior
            2. Baixe o `.apk` abaixo
            3. Instale e abra — GPS solicitará permissão automaticamente
            **Build:** #${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
