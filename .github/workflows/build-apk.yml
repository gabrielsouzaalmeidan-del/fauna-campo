name: Build APK - Fauna Campo

on:
  push:
    branches: [ main, master ]
    paths:
      - 'www/**'
      - 'capacitor.config.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do APK (ex: 1.7.1)'
        required: false
        default: 'latest'

jobs:
  build:
    name: Gerar APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout do repositório ──────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Node.js ──────────────────────────────────────
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Android SDK ──────────────────────────────────
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Instalar dependências ─────────────────────────
      - name: Instalar dependências npm
        run: npm ci

      # ── 6. Adicionar plataforma Android ─────────────────
      - name: Adicionar plataforma Android
        run: npx cap add android
        continue-on-error: true

      # ── 7. Sincronizar www/ com Android ─────────────────
      - name: Sincronizar arquivos web
        run: npx cap sync android

      # ── 8. Permissões GPS e Câmera no AndroidManifest ───
      - name: Configurar permissões Android
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Adicionar permissões se não existirem
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>|' "$MANIFEST"
            echo "Permissões adicionadas ao AndroidManifest"
          fi

      # ── 9. Configurar gradle para APK ───────────────────
      - name: Configurar versão do APK
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          # Definir versionName com data do build
          DATE=$(date +%Y%m%d)
          sed -i "s/versionName \"1.0\"/versionName \"1.7-$DATE\"/" "$BUILD_GRADLE" || true
          echo "Versão definida: 1.7-$DATE"

      # ── 10. Permissão de execução para gradlew ───────────
      - name: Permissão gradlew
        run: chmod +x android/gradlew

      # ── 11. Build do APK ─────────────────────────────────
      - name: Build APK Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 12. Renomear APK com data ─────────────────────────
      - name: Preparar APK para download
        run: |
          DATE=$(date +%Y-%m-%d)
          APK_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_DST="FaunaCampo_v17_${DATE}.apk"
          cp "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV
          echo "APK_NAME=$APK_DST" >> $GITHUB_ENV
          ls -lah "$APK_DST"

      # ── 13. Upload do APK como artifact ──────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FaunaCampo-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30
          if-no-files-found: error

      # ── 14. Criar Release automático ─────────────────────
      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v17-${{ github.run_number }}
          name: "Fauna Campo v17 — Build ${{ github.run_number }}"
          body: |
            ## 📱 Fauna Campo — APK Android

            **Como instalar:**
            1. Baixe o arquivo `.apk` abaixo
            2. No celular: Configurações → Segurança → Permitir fontes desconhecidas
            3. Abra o arquivo `.apk` e toque em Instalar

            **Inclui:**
            - Coleta de dados faunísticos (Manual, Biometria, Mackinnon)
            - GPS com conversão automática para UTM
            - Banco de 1.254 espécies do Ceará
            - Funciona 100% offline
            - IndexedDB para armazenamento local

            **Build:** #${{ github.run_number }}
            **Data:** ${{ github.event.head_commit.timestamp }}
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
